<meta charset="UTF-8">

<title>40℃高溫即時調適行動演練 — 腳本協作平台</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --accent: #f59e4b;
    --red: #ef4444;
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #1e1325 50%, #1a1220 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 1.5rem;
  }
  .header-top {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 0.5rem;
  }
  .temp-badge {
    background: linear-gradient(135deg, #ef4444, #f59e4b);
    color: #fff;
    font-size: 2.5rem; font-weight: 900;
    padding: 0.5rem 1.2rem;
    border-radius: 12px;
    line-height: 1;
  }
  .header h1 {
    font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(90deg, #f59e4b, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem;
  }
  .header-meta {
    display: flex; gap: 2rem; margin-top: 1rem;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex; gap: 0.5rem; align-items: center;
    color: var(--muted); font-size: 0.85rem;
  }
  .meta-item strong { color: var(--text); }

  /* Tabs */
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--bg); padding: 0 2rem; overflow-x: auto;
  }
  .tab {
    padding: 0.8rem 1.4rem; cursor: pointer; border: none; background: none;
    color: var(--muted); font-size: 0.9rem; font-weight: 500;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

  /* Stage cards */
  .stage-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 1rem;
  }
  .stage-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.2rem;
    transition: border-color 0.2s;
  }
  .stage-card:hover { border-color: var(--accent); }
  .stage-header {
    display: flex; justify-content: space-between; align-items: start;
    margin-bottom: 0.8rem;
  }
  .stage-num {
    font-size: 0.75rem; color: var(--accent); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .stage-title {
    font-size: 1.1rem; font-weight: 700; margin-top: 0.1rem;
  }
  .stage-badge {
    padding: 0.2rem 0.6rem; border-radius: 20px;
    font-size: 0.7rem; font-weight: 600; white-space: nowrap;
  }
  .badge-prep { background: #1e3a2f; color: #4ade80; }
  .badge-action { background: #1e2a4f; color: #60a5fa; }
  .badge-crisis { background: #3b1e1e; color: #f87171; }
  .badge-resolve { background: #2e1e3b; color: #c084fc; }
  .badge-review { background: #1e352f; color: #2dd4bf; }

  .stage-scenario {
    background: #0d1114; border-radius: 8px; padding: 0.8rem;
    margin: 0.8rem 0; font-size: 0.85rem;
    border-left: 3px solid var(--accent);
  }
  .stage-scenario li {
    margin-left: 1rem; margin-bottom: 0.3rem; color: var(--muted);
    list-style: '⚫ ';
  }
  .stage-depts {
    font-size: 0.78rem; color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 0.3rem;
    margin-top: 0.6rem;
  }
  .dept-tag {
    background: #252830; padding: 0.15rem 0.5rem; border-radius: 4px;
    font-size: 0.72rem;
  }

  /* Participants */
  .participants-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .org-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem;
  }
  .org-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
  .org-card .org-type {
    font-size: 0.7rem; text-transform: uppercase; color: var(--accent);
    font-weight: 600; letter-spacing: 0.05em;
  }
  .org-stages {
    margin-top: 0.5rem; display: flex; gap: 0.3rem; flex-wrap: wrap;
  }
  .org-stage-tag {
    font-size: 0.65rem; padding: 0.1rem 0.4rem;
    border-radius: 3px; background: #252830;
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before {
    content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0;
    width: 2px; background: var(--border);
  }
  .tl-item {
    position: relative; margin-bottom: 2rem; padding-left: 1.5rem;
  }
  .tl-item::before {
    content: ''; position: absolute; left: -1.65rem; top: 0.4rem;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
  }
  .tl-item.day { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
  .tl-item h4 { font-size: 1rem; margin: 0.2rem 0 0.5rem; }
  .tl-item .tl-desc { color: var(--muted); font-size: 0.85rem; }

  /* Table */
  table.data-table {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
  }
  table.data-table th {
    text-align: left; padding: 0.6rem 0.8rem;
    background: var(--card); border-bottom: 2px solid var(--border);
    font-weight: 600; color: var(--accent);
  }
  table.data-table td {
    padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border);
  }
  table.data-table tr:hover td { background: #1a1d27; }

  /* Stats row */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; text-align: center;
  }
  .stat-value {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, #f59e4b, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

  /* Footer */
  .footer {
    text-align: center; padding: 2rem;
    color: var(--muted); font-size: 0.78rem;
    border-top: 1px solid var(--border); margin-top: 2rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header h1 { font-size: 1.3rem; }
    .temp-badge { font-size: 1.8rem; }
    .stage-grid { grid-template-columns: 1fr; }
    .main, .tabs { padding: 1rem; }
  }
</style>

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const content = document.getElementById('content');
  switch(tab) {
    case 'overview': renderOverview(content); break;
    case 'stages': renderStages(content); break;
    case 'timeline': renderTimeline(content); break;
    case 'orgs': renderOrgs(content); break;
    case 'scenarios': renderScenarios(content); break;
    case 'reference': renderReference(content); break;
  }
}

function typeBadge(type) {
  const map = {
    'prep': ['前置準備', 'badge-prep'],
    'action': ['調適行動', 'badge-action'],
    'crisis': ['災害應變', 'badge-crisis'],
    'resolve': ['狀況解除', 'badge-resolve'],
    'review': ['評核階段', 'badge-review']
  };
  const [label, cls] = map[type] || [type, ''];
  return `<span class="stage-badge ${cls}">${label}</span>`;
}
